databases:
  - name: exceltoweb-db
    region: oregon
    plan: free
    postgresMajorVersion: "17"
    ipAllowList: []

services:
  - type: web
    name: exceltoweb-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r backend/requirements.txt
    startCommand: PYTHONPATH=backend uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: exceltoweb-db
          property: connectionString
      - key: API_AUTH_SECRET
        generateValue: true
      - key: MARKET_SOURCE
        value: file
      - key: MARKET_CACHE_TTL_SECONDS
        value: "60"
      - key: MARKET_HTTP_TIMEOUT
        value: "8"
      - key: CORS_ALLOW_ORIGINS
        value: https://shuozhongdian.cn,https://www.shuozhongdian.cn
